{% extends "blog/layout.html" %}
{% load static %}
{% block head %}
{% endblock %}

{% block blog_body %}



<main role="main" class="container">
    <div class="row">
      <div class="col-md-8 blog-main">  
        <div class="blog-post">
            <h2 class="blog-post-title">{{ post.title|title }}</h2>
            <p class="blog-post-meta">{{ post.pub_date }} by <a href="#">{{ post.author.first_name }} {{ post.author.last_name }}</a></p>

            <p>{{ post.blurb }}</p>
            <hr>
            <p>
                {{ post.body|safe }}
            </p>
        </div><!-- /.blog-post -->
  
        <nav class="blog-pagination">
          <a class="btn btn-outline-primary" href="#">Older</a>
          <a class="btn btn-outline-secondary disabled" href="#" tabindex="-1" aria-disabled="true">Newer</a>
        </nav>
  
      </div><!-- /.blog-main -->

  
    </div><!-- /.row -->
  
  </main><!-- /.container -->

<hr>
<a href="{% url 'blog:index' %}" class="btn btn-secondary">Back</a>

{% endblock %}
